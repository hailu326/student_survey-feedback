    <script>
        const userIdField = document.getElementById("user_id");
        const fullNameField = document.getElementById("full_name");
        const emailField = document.getElementById("email");
        const passwordField = document.getElementById("password");
        const departmentField = document.getElementById("department");
        const userIdError = document.getElementById("userIdError");
        const fullNameError = document.getElementById("fullNameError");
        const emailError = document.getElementById("emailError");
        const sexError = document.getElementById("sexError");
        const passwordError = document.getElementById("passwordError");
        const departmentError = document.getElementById("departmentError");

        function togglePassword() {
            passwordField.type = passwordField.type === "password" ? "text" : "password";
        }

        function validateForm() {
            let valid = true;
            document.querySelectorAll(".error").forEach(e => e.style.display = "none");

            if (userIdField.value.trim() === "") {
                userIdError.style.display = "block";
                valid = false;
            }

            if (fullNameField.value.trim() === "") {
                fullNameError.style.display = "block";
                valid = false;
            }

            if (emailField.value.trim() === "") {
                emailError.style.display = "block";
                valid = false;
            }

            if (!document.querySelector('input[name="sex"]:checked')) {
                sexError.style.display = "block";
                valid = false;
            }

            if (passwordField.value.length < 8) {
                passwordError.style.display = "block";
                valid = false;
            }

            if (departmentField.value === "") {
                departmentError.style.display = "block";
                valid = false;
            }

            return valid;
        }

        $('#college').change(function () {
            let collegeID = $(this).val();
            if (collegeID) {
                $.post('fetch_data.php', { college_id: collegeID }, function (data) {
                    $('#department').html(data);
                });
            }
        });

        $('#loginBtn').click(function () {
            window.location.href = "login.html";
        });
        
        // Mobile menu toggle
        const navToggle = document.querySelector('.nav-toggle');
        const navMenu = document.querySelector('.nav-menu');
        
        navToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
    </script>
